<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ian Hay — Sandbox</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --card-bg: #161616;
            --text: #f0f0f0;
            --muted: #888888;
            --accent: #00ff87;
            --border: #262626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--muted);
            font-size: 0.95rem;
        }

        /* Filter Pills Section */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            align-items: center;
        }

        .filter-btn {
            background: var(--card-bg);
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            color: var(--bg);
            background: var(--text);
            border-color: var(--text);
        }

        .filter-btn.active-accent {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--text);
        }

        .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .card:hover .tag {
            color: #ccc;
        }
    </style>
</head>
<body>

    <header>
        <h1>Sandbox Directory</h1>
        <p class="subtitle">Guides, documentation, and experiments</p>
    </header>

    <!-- Filter Buttons -->
    <div class="controls" id="filter-container">
        <button class="filter-btn active-accent" onclick="filterSelection('all', this)">All</button>
        <button class="filter-btn" onclick="filterSelection('qgis', this)">QGIS</button>
        <button class="filter-btn" onclick="filterSelection('python', this)">Python</button>
        <button class="filter-btn" onclick="filterSelection('guides', this)">Guides</button>
    </div>

    <!-- Items Grid -->
    <div class="grid">
        
        <!-- CARD 1 -->
        <a href="guide_to_qgis_plugin_uploading.html" class="card" data-tags="qgis guides">
            <div>
                <div class="card-title">Guide to QGIS Plugin Uploading</div>
            </div>
            <div class="card-tags">
                <span class="tag">QGIS</span>
                <span class="tag">Guides</span>
            </div>
        </a>

        <!-- Add future cards below here! -->

    </div>

    <script>
        function filterSelection(category, btn) {
            const cards = document.querySelectorAll('.card');
            const buttons = document.querySelectorAll('.filter-btn');

            // Toggle active state on buttons
            buttons.forEach(b => b.classList.remove('active-accent'));
            btn.classList.add('active-accent');

            // Show/Hide Cards
            cards.forEach(card => {
                const tags = card.getAttribute('data-tags').split(' ');
                if (category === 'all' || tags.includes(category)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
